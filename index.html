<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.css"
      integrity="sha512-wCVOuVtxsXqrQK7tj9j4BvyfITQmpp7UE7mVilD7aieGLYFEIAa5UKTP1RapOf6dxQ9JIKAneakcyykWG4r4Ow=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./app.css" />
    <link rel="stylesheet" href="./tailwind.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Vollkorn&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-black">
    <div id="fullpage">
      <!-- page one -->
      <div class="section">
        <div class="w-full relative overflow-hidden px-5 py-6 h-screen">
          <div class="w-80 rotate-90 absolute -right-28 top-40">
            <marquee>
              <p class="text-white font-Vollkorn">
                HELLO WORLD HELLO WORLD HELLO WORLD
              </p>
            </marquee>
          </div>
          <img
            src="./image/photo-1.webp"
            width="190"
            loading="lazy"
            class="absolute right-4 z-50 rounded-lg top-72"
          />
          <p class="text-7xl text-white font-Vollkorn">Miko Meysa Bima</p>
          <p class="font-Vollkorn text-xl text-white">web developer</p>

          <marquee behavior="" direction="" class="text-white">
            <h1 class="font-Vollkorn text-[300px]">INDONESIA</h1>
          </marquee>
        </div>
      </div>
      <!-- page 2 -->
      <div class="section">
        <div class="relative w-full h-screen">
          <div class="flex flex-wrap">
            <img src="./image/photo-3.webp" loading="lazy" />
            <img src="./image/photo-4.webp" class="w-2/4" loading="lazy" />
            <img src="./image/photo-5.webp" class="w-2/4" loading="lazy" />
            <img src="./image/photo-6.webp" class="w-2/4" loading="lazy" />
            <img src="./image/photo-7.webp" class="w-2/4" loading="lazy" />
            <img src="./image/photo-2.webp" loading="lazy" />
          </div>
        </div>
      </div>

      <!-- page 3 -->
      <div class="section px-5 py-6">
        <p class="font-Vollkorn text-2xl text-white">ABOUT ME</p>
        <p class="font-Vollkorn text-xl text-white mt-4">
          Hallo everyone, call me Miko, i am Web Developer, i'm have 1.5 years
          experiences of computer science, i'm using javascript and typescript
          for my daily work
        </p>
      </div>

      <div class="section p-6 font-Vollkorn text-white text-7xl">
        Thanks You.
      </div>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/fullPage.js/4.0.20/fullpage.js"
      integrity="sha512-ekWIiATJSaL5RWmBSap8JDgTMCIBCso5UFovYoMix+a4qFcVDryBcCt4P0kJA4kA0YtmnJuzfTcmb9+TIznIlg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
